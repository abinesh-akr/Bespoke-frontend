<app-navbar></app-navbar>
<div class="cart-container">
  <h2>Your Cart</h2>
  <mat-card *ngFor="let item of cart.items" class="cart-item">
    <img mat-card-image [src]="item.food.image" alt="{{item.food?.name || 'Unknown'}}">
    <mat-card-content>
      <h3>{{item.food?.name || 'Unknown Item'}}</h3>
      <p>Price: ${{item.food?.price || 0 | number:'1.2-2'}}</p>
      <p>Quantity: {{item.quantity || 0}}</p>
      <p>Bespoke Note: {{item.bespokeNote || 'None'}}</p>
      <mat-form-field>
        <mat-label>Rating</mat-label>
        <input matInput type="number" min="0" max="5" [(ngModel)]="item.rating" (change)="updateRating(item)">
      </mat-form-field>
    </mat-card-content>
  </mat-card>
  <div class="cart-actions">
    <button mat-raised-button color="primary" (click)="checkout()" [disabled]="!cart.items.length">Proceed to Payment</button>
  </div>
</div>
