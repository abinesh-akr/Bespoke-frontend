<div class="payment-container">
    <mat-card class="payment-card">
      <mat-card-header>
        <mat-card-title>Payment</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()">
          <mat-form-field>
            <mat-label>Card Number</mat-label>
            <input matInput formControlName="cardNumber" required>
          </mat-form-field>
          <mat-form-field>
            <mat-label>Expiry Date</mat-label>
            <input matInput formControlName="expiry" required>
          </mat-form-field>
          <mat-form-field>
            <mat-label>CVV</mat-label>
            <input matInput formControlName="cvv" required>
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="paymentForm.invalid">Pay Now</button>
          <button mat-raised-button color="accent"  (click)="back()">Cancel</button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
