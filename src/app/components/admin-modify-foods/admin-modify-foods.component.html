<div class="admin-container">
    <mat-card class="admin-card">
      <mat-card-header>
        <mat-card-title>Modify Foods</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="modifyFoodForm" (ngSubmit)="onUpdate()">
          <mat-form-field>
            <mat-label>Food ID</mat-label>
            <input matInput formControlName="id" required>
          </mat-form-field>
          <mat-form-field>
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" required>
          </mat-form-field>
          <mat-form-field>
            <mat-label>Price</mat-label>
            <input matInput type="number" formControlName="price" required>
          </mat-form-field>
          <mat-form-field>
            <mat-label>Image URL</mat-label>
            <input matInput formControlName="image">
          </mat-form-field>
          <mat-form-field>
            <mat-label>Chef ID</mat-label>
            <input matInput formControlName="chef">
          </mat-form-field>
          <mat-form-field>
            <mat-label>Bespoke Option</mat-label>
            <input matInput formControlName="bespokeOption">
          </mat-form-field>
          <mat-form-field>
            <mat-label>Tags (comma-separated)</mat-label>
            <input matInput formControlName="tags">
          </mat-form-field>
          <button mat-raised-button color="primary" type="submit" [disabled]="modifyFoodForm.invalid">Update Food</button>
          <button mat-raised-button color="warn" (click)="onDelete()">Delete Food</button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
